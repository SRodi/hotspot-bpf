name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-"$(uname -r)" gcc linux-headers-"$(uname -r)"

      - name: Install bpf2go
        run: go install github.com/cilium/ebpf/cmd/bpf2go@latest

      - name: Generate vmlinux.h
        run: sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Generate BPF bindings
        run: go generate ./...

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o hotspot-bpf-linux-amd64 ./cmd/hotspot

      - name: Package release archive
        run: |
          tar czf hotspot-bpf-linux-amd64.tar.gz hotspot-bpf-linux-amd64 README.md LICENSE thresholds.yaml
          sha256sum hotspot-bpf-linux-amd64.tar.gz > hotspot-bpf-linux-amd64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hotspot-bpf-linux-amd64.tar.gz
            hotspot-bpf-linux-amd64.tar.gz.sha256
