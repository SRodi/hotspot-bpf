name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # renovate: datasource=docker depName=golang
  GO_IMAGE_VERSION: "1.24"

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary in container
        run: |
          docker run --rm \
            --privileged \
            --workdir /src \
            --volume "$PWD":/src \
            docker.io/library/golang:${GO_IMAGE_VERSION} \
            sh -c "
              apt-get update && \
              apt-get install -y --no-install-recommends clang llvm bpftool gcc && \
              go install github.com/cilium/ebpf/cmd/bpf2go@latest && \
              bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h && \
              go generate ./... && \
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
                go build -ldflags='-s -w -X main.version=${GITHUB_REF_NAME}' \
                -o hotspot-bpf-linux-amd64 ./cmd/hotspot
            "

      - name: Package release archive
        run: |
          tar czf hotspot-bpf-linux-amd64.tar.gz hotspot-bpf-linux-amd64 README.md LICENSE thresholds.yaml
          sha256sum hotspot-bpf-linux-amd64.tar.gz > hotspot-bpf-linux-amd64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hotspot-bpf-linux-amd64.tar.gz
            hotspot-bpf-linux-amd64.tar.gz.sha256
